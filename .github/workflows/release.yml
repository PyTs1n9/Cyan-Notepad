# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Release

"on":
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"              # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"   # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tagName: "${{ github.ref_name }}"
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New
            - v0.2.0 新增设置自动保存选项，自动保存当前页面的记事本
            - v0.2.0 新增笔记和待办的置顶功能
            - v0.2.0 新增待办事项截止时间设置功能
            - v0.2.0 将MD模式变为主工作区，新增 源码|预览|分屏 3种模式，仿照jetbrains编译器模式
            - v0.2.0 新增笔记拖动功能
            - v0.2.0 新增笔记分类，可将笔记拖动到分类中，默认存在全部笔记和未分类笔记2个文件夹
            - v0.2.0 新增友情赞助区域，你的赞助是我vibe的动力

            ## 改进 | Improved
            - v0.2.0 优化了设置Setting布局
            - v0.2.0 优化了工作区域视图布局
            - v0.2.0 优化了待办事项一些选择的组件样式
            - v0.2.0 将快速点击3次关闭磁贴优化为双击磁贴标题关闭磁贴
            - v0.2.0 优化了markdown和txt文件的导入，合成为一个导入文件按钮
            - v0.2.0 优化了整体UI组件高度和宽度，更加工整

            ## 修复 | Fixed
            - v0.2.0 解决了软件无限多开的BUG，系统托盘最多存在一个软件后台
            - v0.2.0 解决了构建项目本地无数累积内存的问题，最多预留3个历史版本
            - v0.2.0 解决了MD模式下，打开网址使用默认浏览器而无法退出的BUG，更改为使用内置浏览器打开网址
            - v0.2.0 解决了新工作区Ctrl+S不可用的BUG

            ## 删除 | Deleted
            - v0.2.0 删除记事本模式和MD模式
            - v0.2.0 删除工具栏，工作区更简洁
            - v0.2.0 删除右上角导出MD文件和TXT文件，合二为一到侧边栏中为导出文件

            ## 问题 | Issues
            - v0.2.0 吸附桌面边框模式仍然有很大问题，v0.2.0暂时不公开使用，已关闭接口

            ## 更新中 | Renewing
            - 桌面显示日历表，日历表中自定义待办。

            ## 下载 | Download
            - `Cyan-Notepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）
            - `CyanNotepad_<version>_x64-setup.msi` — Windows 安装包
          releaseDraft: "false"
          prerelease: "false"
