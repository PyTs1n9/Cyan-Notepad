name: Build and Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm                # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri     # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New

            ## 改进 | Improved
            - BaiQingTodo 柏青待办 正式改名为Cyan Notepad 青色记事本。
            - 软件LOGO和图标更新。
            - 待办事项功能优化：

            ## 修复 | Fixed

            ## 删除 | Deleted

            ## 问题 | Issues

            ## 更新中 | Renewing
            - 吸附桌面边框模式。
            - 桌面显示日历表。
            - 日历表中自定义待办。

            ## 下载 | Download
            - `Cyan-Notepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）
            - `CyanNotepad_<version>_x64-setup.msi` — Windows 安装包
          releaseDraft: false
          prerelease: false
