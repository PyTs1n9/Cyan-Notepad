# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Release

"on":
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"              # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"   # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VITE_SUPABASE_URL: "https://skwkzymlhqwgygwwlxoy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_8TIwPzBdrHmYEwhnikfk5g_sVjODHwW"
          VITE_COLLAB_URL: "${{ vars.VITE_COLLAB_URL }}"
        with:
          tagName: "${{ github.ref_name }}"
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New

            - 新增记事本中新建分类添加到index.json，方便用户自定义分类。

            ## 改进 | Improved

            - 改进了云文档的实时协作体验，支持多人同时编辑同一文档。
            - 改进了云文档的同步机制，减少了数据冲突的可能性。
            - 改进了应用的启动速度和性能，提升了用户体验。
            - 改进了应用的界面设计，使其更加美观和易用。
            
            ## 修复 | Fixed

            - 修复了v0.3.0无法读取安装目录的本地数据问题，v0.3.1 及以上版本会自动迁移旧目录数据。

            ## 删除 | Removed

            ## 问题 | Issues

            - 画布目前只保存在本地，不会同步到在线工作台；实时协作仅适用于云文档。
            - 云文档的实时同步依赖网络和有效登录会话；断线时本地 IndexedDB 只提供暂存，不能替代云端备份确认。
            - 当前发行包面向 Windows x64，其他操作系统没有经过发布流程验证。

            ## 下载 | Download

            - `CyanNotepad_<version>_x64-setup.exe` — Windows NSIS 安装包。
            - `CyanNotepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）。
          releaseDraft: "false"
          prerelease: "false"
