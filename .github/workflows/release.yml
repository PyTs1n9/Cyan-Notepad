# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Release

"on":
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"              # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"   # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VITE_SUPABASE_URL: "https://skwkzymlhqwgygwwlxoy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_8TIwPzBdrHmYEwhnikfk5g_sVjODHwW"
          VITE_COLLAB_URL: "${{ vars.VITE_COLLAB_URL }}"
        with:
          tagName: "${{ github.ref_name }}"
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New
            - v0.3.5 新增云文档定时发布模块
            - v0.3.5 新增帮助关于界面个人博客和QQ讨论群
            - v0.3.5 新增工作台文档拖动
            - v0.3.5 新增工作台网络延迟波动检测

            ## 改进 | Improved
            - v0.3.5 优化工作台功能UI布局
            - v0.3.5 优化工作台多权限协作管理
            - v0.3.5 优化工作台文档UI样式
            - v0.3.5 优化titie栏传送门所有快捷按键

            ## 修复 | Fixed

            ## 删除 | Removed
            - v0.3.5 删除分享工作台下方的描述字段

            ## 问题 | Issues

            ## 下载 | Download

            - `CyanNotepad_<version>_x64-setup.exe` — Windows NSIS 安装包。
            - `CyanNotepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）。
          releaseDraft: "false"
          prerelease: "false"