# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Release

"on":
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"              # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"   # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VITE_SUPABASE_URL: "https://skwkzymlhqwgygwwlxoy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_8TIwPzBdrHmYEwhnikfk5g_sVjODHwW"
          VITE_COLLAB_URL: "${{ vars.VITE_COLLAB_URL }}"
        with:
          tagName: "${{ github.ref_name }}"
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New
            - v0.3.4 新增代码块独立头高亮渲染
            - v0.3.4 新增画布TipTap类型工具 结构图绘制 磁贴 涂鸦工具 复制粘贴
            - v0.3.4 新增多人协作工作台定时发布与下架功能

            ## 改进 | Improved
            - v0.3.4 优化记事本编辑器生态
            - v0.3.4 优化记事本笔记名字显示逻辑
            - v0.3.4 优化多人协作工作台延迟检测
            - v0.3.4 优化进入软件默认工作模块为记事本
            - v0.3.4 将左上角C首字母更改为软件logo

            ## 修复 | Fixed
            - v0.3.4 修复无法使用`- [ ]`待办md语法
            - v0.3.4 修复工作台无法ctrl+滚轮缩放和行数未同步
            - v0.3.4 修复换行符无法同步预览
            - v0.3.4 修复制表符为4个空格问题
            - v0.3.4 修复待办事项日历溢出问题

            ## 删除 | Removed
            - v0.3.4 

            ## 问题 | Issues
            - v0.3.4 

            ## 下载 | Download

            - `CyanNotepad_<version>_x64-setup.exe` — Windows NSIS 安装包。
            - `CyanNotepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）。
          releaseDraft: "false"
          prerelease: "false"
