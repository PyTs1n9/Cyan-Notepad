# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Release

"on":
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:    # 也支持手动触发

# 授予 GITHUB_TOKEN 写入权限，否则无法创建 Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"              # 自动缓存 node_modules，加速 npm ci

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"   # 缓存 src-tauri/target/，加速 cargo build

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VITE_SUPABASE_URL: "https://skwkzymlhqwgygwwlxoy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_8TIwPzBdrHmYEwhnikfk5g_sVjODHwW"
          VITE_COLLAB_URL: "${{ vars.VITE_COLLAB_URL }}"
        with:
          tagName: "${{ github.ref_name }}"
          releaseName: 'Cyan Notepad v__VERSION__'
          releaseBody: |
            ## 新增 | New

            - 在线工作台：Supabase 邮箱注册/登录、工作台创建与邀请码加入。
            - 工作台角色和成员管理：owner、editor、viewer 权限，支持调整角色、移除成员、离开或删除工作台。
            - 云文档实时协作：基于 Hocuspocus + Yjs，支持多人编辑、在线成员状态、最近编辑提示和查看者只读模式。
            - 用户资料：昵称、头像、头像历史、密码修改，以及成员资料实时刷新和被移出工作台通知。
            - 多待办清单：清单创建、重命名、置顶、删除、拖拽排序和独立任务统计。
            - 自由画布：多画布、图片/文本元素、粘贴与拖放导入、平移缩放、缩略图、图层、撤销/重做和 PNG/JPEG/SVG 导出。
            - Markdown 本地图片附件：粘贴图片会保存到应用数据目录，预览支持附件、文件路径和网络图片。
            - 个性化设置：自定义应用背景、背景历史、图片缓存管理、便签透明度和个人账户设置。
            - 协作服务器、Supabase 迁移、Docker/Render 部署模板及在线工作台部署文档。

            ## 改进 | Improved

            - 记事本统一为 Markdown 源码/预览/分屏工作区，增加撤销/重做、Tab 缩进、异步图片解析和预览竞态保护。
            - Markdown 预览改为安全渲染原始 HTML，保留旧版 HTML 笔记转换能力，并改善外部链接和本地图片处理。
            - 本地数据存储增加安装目录与 `%APPDATA%` 回退、旧目录迁移、图片资源分区和未使用附件清理。
            - 主界面改为 VS Code 风格活动栏，侧边栏和工作台侧栏均支持折叠、拖拽调整宽度和语言切换后的自适应布局。
            - 标题栏、菜单、登录入口、托盘窗口和磁贴/便签主题同步得到统一的视觉与交互处理。
            - 工作台文档元数据按需加载，协作编辑器和工作台视图延迟加载，减少首屏负担。
            - Release 工作流升级 Node.js 22、Rust 缓存、公开环境变量注入和 Render 免费协作服务部署配置。

            ## 修复 | Fixed

            - 修复 v0.2.1 语言切换后侧边栏字段显示异常的问题。
            - 修复切换笔记或工作台文档时旧内容、旧预览和旧协作状态短暂覆盖当前内容的问题。
            - 修复 Markdown 预览原始 HTML 直接注入页面、部分本地图片路径无法解析的问题。
            - 修复粘贴图片后附件未被正确保存、切换笔记后无用附件长期残留的问题。
            - 修复旧版单列表待办数据加载后无法正常使用多清单结构的问题。
            - 修复侧边栏拖拽计算包含活动栏宽度、中文/英文切换后可用宽度不足的问题。
            - 修复工作台成员资料、角色变化和移除成员后的界面状态不能及时刷新的问题。
            - 修复画布旧版资源目录迁移、画布图片删除后的资源回收和导出时图片缺失的问题。

            ## 删除 | Removed

            - 删除记事本侧栏中重复的“记事本 / 待办 / 工作台”导航按钮，统一由活动栏和标题栏工具菜单切换视图。

            ## 问题 | Issues

            - 画布目前只保存在本地，不会同步到在线工作台；实时协作仅适用于云文档。
            - 云文档的实时同步依赖网络和有效登录会话；断线时本地 IndexedDB 只提供暂存，不能替代云端备份确认。
            - 当前发行包面向 Windows x64，其他操作系统没有经过发布流程验证。

            ## 下载 | Download

            - `CyanNotepad_<version>_x64-setup.exe` — Windows NSIS 安装包。
            - `CyanNotepad.exe` — 自包含可执行文件（无需额外运行时，开箱即用）。
          releaseDraft: "false"
          prerelease: "false"
